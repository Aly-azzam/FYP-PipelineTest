<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video comparison - upload</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <h1>Video comparison</h1>
        <p class="subtitle">
          Upload the expert reference and the learner recording, then run the
          comparison.
        </p>
      </header>

      <main class="grid">
        <section class="card" aria-labelledby="expert-label">
          <div class="card-head">
            <h2 id="expert-label">Expert video</h2>
            <span class="badge">Reference</span>
          </div>
          <label class="drop-zone" data-slot="expert">
            <input
              type="file"
              id="expert-video"
              name="expert"
              accept="video/*"
              hidden
            />
            <span class="drop-zone__icon" aria-hidden="true">▶</span>
            <span class="drop-zone__text">Choose or drop a video file</span>
            <span class="drop-zone__hint" id="expert-filename-hint">No file selected</span>
          </label>
          <video
            id="expert-preview"
            class="preview"
            controls
            playsinline
            hidden
          ></video>
        </section>

        <section class="card" aria-labelledby="learner-label">
          <div class="card-head">
            <h2 id="learner-label">Learner video</h2>
            <span class="badge badge--learner">To compare</span>
          </div>
          <label class="drop-zone" data-slot="learner">
            <input
              type="file"
              id="learner-video"
              name="learner"
              accept="video/*"
              hidden
            />
            <span class="drop-zone__icon" aria-hidden="true">▶</span>
            <span class="drop-zone__text">Choose or drop a video file</span>
            <span class="drop-zone__hint" id="learner-filename-hint">No file selected</span>
          </label>
          <video
            id="learner-preview"
            class="preview"
            controls
            playsinline
            hidden
          ></video>
        </section>
      </main>

      <footer class="footer">
        <button type="button" class="btn btn--primary" id="compare-btn" disabled>
          Run comparison
        </button>
        <p class="footer-note" id="compare-note">
          Select both videos, then run the comparison.
        </p>
      </footer>

      <section class="result card" id="result-panel" hidden aria-live="polite">
        <div class="result-head">
          <h2>Comparison output</h2>
          <span class="badge" id="result-pipeline">vlm_only</span>
        </div>
        <p class="result-status" id="result-status">Waiting for videos.</p>
        <div class="result-score" id="result-score" hidden>
          <span class="result-score__label">Overall score</span>
          <strong class="result-score__value" id="result-score-value">--</strong>
        </div>
        <p class="result-text" id="result-text"></p>
        <div class="result-columns">
          <div>
            <h3>Strengths</h3>
            <ul id="result-strengths" class="result-list"></ul>
          </div>
          <div>
            <h3>Weaknesses</h3>
            <ul id="result-weaknesses" class="result-list"></ul>
          </div>
        </div>
        <div class="result-meta" id="result-meta"></div>
        <ul id="result-warnings" class="result-list result-list--warnings"></ul>
      </section>
    </div>
    <script src="app.js"></script>
  </body>
</html>
